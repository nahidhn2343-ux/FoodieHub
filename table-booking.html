<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Booking - Foodie Hub</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo"><h2>FOODIE HUB</h2></div>
            <nav>
                <ul>
                    <li><a href="admin-ds.html"><i class="fa-solid fa-satellite-dish"></i> Live Orders</a></li>
                    <li class="active"><a href="table-booking.html"><i class="fa-solid fa-table"></i> Table Booking</a></li>
                    <li><a href="totalsale.html"><i class="fa-solid fa-chart-line"></i> Total Sale</a></li>
                    <li><a href="submit-product.html"><i class="fa-solid fa-plus-circle"></i> Submit Food</a></li>
                    <li><a href="submit-offer.html"><i class="fa-solid fa-tags"></i> Submit Offer</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer"><a href="index.html"><i class="fa-solid fa-sign-out-alt"></i> Logout</a></div>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="bookingSearch" placeholder="Search bookings...">
                </div>
            </header>
            <section class="dashboard-overview">
                <h1>Table Booking Dashboard</h1>
                <div class="stats-cards">
                    <div class="card blue"><h3 id="total-bookings-count">0</h3><p>Total Bookings</p></div>
                    <div class="card green"><h3 id="confirmed-bookings-count">0</h3><p>Confirmed</p></div>
                    <div class="card orange"><h3 id="pending-bookings-count">0</h3><p>Pending</p></div>
                </div>
                <div class="table-container">
                    <div class="table-header"><h2>Recent Bookings</h2></div>
                    <table>
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Customer Name</th>
                                <th>Persons</th>
                                <th>Date / Time</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="booking-table-body">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="bookingDetailsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:rgb(255, 255, 255); padding:30px; border-radius:15px; width:90%; max-width:400px; position:relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <i class="fa-solid fa-circle-xmark" id="closeModalBtn" style="position:absolute; top:15px; right:15px; font-size:24px; cursor:pointer; color:#b6a19f;"></i>
            <h3 style="margin-bottom:20px; color:#2c3e50; border-bottom:2px solid #f2efef; padding-bottom:10px;">Booking Information</h3>
            <div id="bookingInfoContent" style="line-height:1.8; color:#444; font-family: sans-serif;">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            onSnapshot, 
            query, 
            orderBy, 
            doc, 
            updateDoc,
            deleteDoc 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import firebaseConfig from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const bookingTable = document.getElementById('booking-table-body');
        const totalCount = document.getElementById('total-bookings-count');
        const confirmedCount = document.getElementById('confirmed-bookings-count');
        const pendingCount = document.getElementById('pending-bookings-count');
        const modal = document.getElementById('bookingDetailsModal');
        const modalContent = document.getElementById('bookingInfoContent');

        // পপআপ বন্ধ করার লজিক
        document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';

        // রিয়েল-টাইম লিসেনার
        onSnapshot(query(collection(db, "orders"), orderBy("orderTime", "desc")), (snapshot) => {
            if (bookingTable) bookingTable.innerHTML = "";
            
            let stats = { total: 0, confirmed: 0, pending: 0 };

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;

                if (data.type === "Table Booking") {
                    stats.total++;
                    const isConfirmed = data.status === "Confirmed";
                    if (isConfirmed) stats.confirmed++; else stats.pending++;

                    const tr = document.createElement('tr');
                    
                    // নাম ক্লিক করলে ডিটেইলস দেখাবে
                    tr.innerHTML = `
                        <td>#${id.substring(0, 5).toUpperCase()}</td>
                        <td class="customer-name-link" style="cursor:pointer; color:#3498db; font-weight:bold;">${data.fname || 'N/A'}</td>
                        <td>Booking</td>
                        <td>${data.orderTime || 'N/A'}</td>
                        <td><span class="status ${isConfirmed ? 'green' : 'orange'}">${data.status}</span></td>
                    `;

                    // নামের ওপর ক্লিক ইভেন্ট অ্যাড করা
                    tr.querySelector('.customer-name-link').onclick = () => {
                        modalContent.innerHTML = `
                            <p><strong>Customer Name:</strong> ${data.fname || 'N/A'} ${data.lname || ''}</p>
                            <p><strong>Phone:</strong> ${data.phone || 'N/A'}</p>
                            <p><strong>WhatsApp:</strong> ${data.whatsapp || 'N/A'}</p>
                            <p><strong>Booking Time:</strong> ${data.orderTime || 'N/A'}</p>
                            <p><strong>Status:</strong> <span style="color:${isConfirmed ? '#2ecc71' : '#f39c12'}">${data.status}</span></p>
                        `;
                        modal.style.display = 'flex';
                    };

                    // --- Action Column (Confirm & Delete বাটন) ---
                    const actionTd = document.createElement('td');
                    actionTd.style.display = "flex";
                    actionTd.style.gap = "15px";
                    actionTd.style.alignItems = "center";

                    // ১. কনফার্ম বাটন (যদি পেন্ডিং থাকে)
                    if (!isConfirmed) {
                        const confirmBtn = document.createElement('button');
                        confirmBtn.innerText = "Confirm";
                        confirmBtn.style = "background:#2ecc71; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;";
                        confirmBtn.onclick = async () => {
                            if (confirm("Confirm this booking?")) {
                                try {
                                    await updateDoc(doc(db, "orders", id), { status: "Confirmed" });
                                } catch (err) { alert("Error: " + err.message); }
                            }
                        };
                        actionTd.appendChild(confirmBtn);
                    }

                    // ২. ডিলিট বাটন (আইকন)
                    const deleteBtn = document.createElement('i');
                    deleteBtn.className = "fa-solid fa-trash";
                    deleteBtn.style = "color: #e74c3c; cursor: pointer; font-size: 16px;";
                    deleteBtn.onclick = async () => {
                        if (confirm("Are you sure you want to delete this booking?")) {
                            try {
                                await deleteDoc(doc(db, "orders", id));
                                alert("Booking deleted!");
                            } catch (err) { alert("Error: " + err.message); }
                        }
                    };

                    actionTd.appendChild(deleteBtn);
                    tr.appendChild(actionTd);
                    bookingTable.appendChild(tr);
                }
            });

            if (totalCount) totalCount.innerText = stats.total;
            if (confirmedCount) confirmedCount.innerText = stats.confirmed;
            if (pendingCount) pendingCount.innerText = stats.pending;
        });
    </script>
</body>
</html>
